name: בדיקות אוטומטיות

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest

    steps:
      - name: שליפת הקוד
        uses: actions/checkout@v4

      - name: התקנת bun
        uses: oven-sh/setup-bun@v2

      - name: התקנת תלויות
        run: bun install

      - name: הרצת בדיקות
        run: bun run test --run --reporter=verbose
